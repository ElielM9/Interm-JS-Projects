<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM JSON Server</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <div
      class="md:flex min-h-screen bg-gray-50 md:align-top font-sans text-gray-900"
    >
      <aside
        class="md:w-2/5 lg:w-2/5 xl:w-1/5 bg-gradient-to-b from-purple-800 to-purple-600 px-6 py-10 shadow-xl z-10 text-white"
      >
        <div class="flex items-center gap-3 mb-8">
          <svg
            class="w-8 h-8 text-purple-200"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"
            ></path>
          </svg>
          <h1 class="uppercase tracking-wider text-2xl font-black">
            ClientLink
          </h1>
        </div>

        <p
          class="text-xs text-purple-200 mb-8 font-semibold tracking-widest uppercase"
        >
          Administra tus clientes
        </p>

        <nav class="space-y-2">
          <a
            href="index.html"
            class="flex items-center gap-3 rounded-lg px-4 py-3 bg-white/20 text-white font-medium hover:bg-white/30 transition-all duration-300 shadow-sm"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"
              ></path>
            </svg>
            Clientes
          </a>
          <a
            href="newClient.html"
            class="flex items-center gap-3 rounded-lg px-4 py-3 text-purple-100 font-medium hover:bg-white/10 hover:text-white transition-all duration-300"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 4v16m8-8H4"
              ></path>
            </svg>
            Nuevo Cliente
          </a>
        </nav>
      </aside>

      <main class="md:w-3/5 xl:w-4/5 px-8 py-12">
        <div class="flex justify-between items-center mb-10">
          <div>
            <h2 class="text-3xl font-bold text-gray-800">
              Listado de Clientes
            </h2>
            <p class="text-gray-500 mt-1 text-sm">
              Gestiona y revisa la información de tus contactos.
            </p>
          </div>
          <a
            href="newClient.html"
            class="bg-purple-600 hover:bg-purple-700 text-white px-5 py-3 rounded-lg shadow hover:shadow-lg transition-all duration-300 font-medium flex items-center gap-2 text-sm"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 4v16m8-8H4"
              ></path>
            </svg>
            Agregar Cliente
          </a>
        </div>

        <div
          class="bg-white shadow-md rounded-xl overflow-hidden border border-gray-100"
        >
          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-gray-200">
              <thead class="bg-gray-50">
                <tr>
                  <th
                    scope="col"
                    class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider"
                  >
                    Nombre Cliente
                  </th>
                  <th
                    scope="col"
                    class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider"
                  >
                    Teléfono
                  </th>
                  <th
                    scope="col"
                    class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider"
                  >
                    Empresa
                  </th>
                  <th
                    scope="col"
                    class="px-6 py-4 text-left text-xs font-bold text-gray-500 uppercase tracking-wider"
                  >
                    Acciones
                  </th>
                </tr>
              </thead>
              <tbody
                id="clients-list"
                class="bg-white divide-y divide-gray-200"
              >

              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
